name: Release

on:
  push:
    branches: ["release/*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (ex: v1.2.3)"
        required: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Type check
        run: pnpm lint && pnpm type-check

      - name: Build
        run: pnpm build

      - name: Extract and validate version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            BRANCH="${{ github.ref_name }}"
            RAW="${BRANCH#release/}"
          fi
          VERSION="v${RAW#v}"
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version '$VERSION'. Branch must follow release/X.Y.Z format."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version resolved: $VERSION"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --generate-notes

      - name: Open PR release → main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ github.ref_name }}
        run: |
          PR_BODY="## Release ${VERSION}

          This PR was automatically created by the release workflow.

          - Tag \`${VERSION}\` has been created
          - GitHub Release has been published
          - Merge this PR into \`main\` to complete the release

          After merging, sync \`develop\`:
          \`\`\`bash
          git checkout develop && git merge origin/main && git push origin develop
          \`\`\`"

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "release: ${VERSION}" \
            --body "${PR_BODY}" \
            --label "type: release" \
            --assignee "<your-github-username>" || echo "PR already exists"
